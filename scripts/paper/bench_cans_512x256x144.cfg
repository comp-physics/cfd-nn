# CaNS-matching benchmark: 512x256x144
# Matches Costa et al. (2021) discretization:
#   2nd-order central FD, RK3, explicit diffusion, FFT Poisson

Nx = 512
Ny = 256
Nz = 144

x_min = 0.0
x_max = 6.0
y_min = -1.0
y_max = 1.0
z_min = 0.0
z_max = 1.0

nu = 0.000177305
dp_dx = -1.0

convective_scheme = central
time_integrator = rk3
adaptive_dt = false
dt = 0.00005
max_steps = 200

gpu_only_mode = true
perf_mode = true
benchmark = true
output_freq = 10000
verbose = false
