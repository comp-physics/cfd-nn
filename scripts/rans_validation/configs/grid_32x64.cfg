# RANS validation: Re_tau=180 channel flow
# Grid convergence: coarse grid (32x64)
# Use CLI overrides for turbulence model: --model sst --output_dir output/sst/

# Grid
Nx = 32
Ny = 64

# Domain
x_min = 0.0
x_max = 6.283185307179586
y_min = -1.0
y_max = 1.0

# Physics
nu = 0.005556
dp_dx = -1.0

# Time stepping
dt = 0.001
adaptive_dt = true
CFL_max = 0.5
max_steps = 50000

# Numerics
convective_scheme = upwind

# Grid stretching
stretch_y = true
stretch_beta = 2.0

# Poisson solver
poisson_tol = 1e-6
poisson_max_vcycles = 16

# Convergence
tol = 1e-8

# Output
output_freq = 500
verbose = true
postprocess = true
write_fields = false
