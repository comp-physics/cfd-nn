# 3D Channel DNS - v13 Recipe (trip + filter)
# Re_tau ~ 180, matching MKM DNS benchmark (Moser, Kim & Mansour 1999)
#
# This is the stable DNS recipe: skew-symmetric convection, RK3 time integration,
# trip forcing for transition, velocity filter for stability.
# Filter adds ~16x molecular viscosity, giving Re_tau ~ 278.
#
# For Tier 2 validation: run 5000+ steps on GPU, compare against MKM data.

simulation_mode = unsteady

# --- Grid (192x96x192 for DNS resolution) ---
Nx = 192
Ny = 96
Nz = 192

# --- Domain ---
x_min = 0.0
x_max = 12.566370614359172  # 4*pi
y_min = -1.0
y_max = 1.0
z_min = 0.0
z_max = 6.283185307179586   # 2*pi

# --- Physics ---
# Re_tau = u_tau * delta / nu = 180
# With delta = 1, u_tau = 1: nu = 1/180
nu = 0.005556
dp_dx = -1.0

# --- Time stepping ---
dt = 0.001
adaptive_dt = true
CFL_max = 0.15
CFL_xz = 0.30
dt_safety = 0.85
max_steps = 5000
tol = 0.0

# --- Turbulence model ---
turb_model = none

# --- Numerical schemes ---
convective_scheme = skew
time_integrator = rk3

# --- Grid stretching ---
stretch_y = true
stretch_beta = 2.0

# --- Trip forcing (v13) ---
trip_enabled = true
trip_amplitude = 1.0
trip_duration = 0.20
trip_ramp_off_start = 0.10
trip_n_modes_z = 16
trip_force_w = true
trip_w_scale = 2.0

# --- Velocity filter (v13) ---
filter_strength = 0.03
filter_interval = 2

# --- Perturbation ---
perturbation_amplitude = 0.05

# --- Poisson solver ---
poisson_solver = mg
poisson_fixed_cycles = 16
poisson_max_vcycles = 24

# --- Performance ---
gpu_only_mode = true
perf_mode = true

# --- Output ---
output_freq = 500
verbose = true
write_fields = false
