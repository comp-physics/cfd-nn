# Lid-driven cavity Re=100 — classic SIMPLE validation
# Top wall moves at u=1, other walls stationary
# No IBM, no body force, no periodicity
Nx = 32
Ny = 32
x_min = 0.0
x_max = 1.0
y_min = 0.0
y_max = 1.0

nu = 0.01
dp_dx = 0.0

max_steps = 2000
tol = 1e-6
time_integrator = simple
simulation_mode = steady
simple_alpha_u = 0.7
simple_alpha_p = 0.3
simple_jacobi_sweeps = 10

CFL_max = 0.5
adaptive_dt = true
dt = 0.01
verbose = true
print_interval = 100

poisson_solver = mg
