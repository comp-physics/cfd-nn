# Quick duct test (short warmup for speed)
Nx = 96
Ny = 96
Nz = 96
nu = 0.000571
dp_dx = -0.003
max_steps = 500000
T_final = 100.0
CFL_max = 0.15
dt_safety = 0.85
adaptive_dt = true
convective_scheme = skew
time_integrator = rk3
poisson_solver = auto
poisson_tol = 1e-6
# Short warmup to develop gradients for NN models.
# The tau_div ramp (0→1 over 200 steps) prevents divergence after model switch.
warmup_model = sst
warmup_time = 2.0
verbose = true
print_interval = 200
gpu_only_mode = true
qoi_freq = 100
qoi_output_dir = qoi_duct
