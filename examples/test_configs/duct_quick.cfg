# Quick duct test (short warmup for speed)
Nx = 96
Ny = 96
Nz = 96
nu = 0.000571
dp_dx = -0.003
max_steps = 500000
T_final = 100.0
CFL_max = 0.15
dt_safety = 0.85
adaptive_dt = true
convective_scheme = skew
time_integrator = rk3
poisson_solver = auto
poisson_tol = 1e-6
# No warmup for duct — all models start from cold.
# Transport models (SST, RSM) bootstrap k/omega via their own equations.
# Non-transport models (NN, GEP) rely on seeded k/omega from the app.
# Warmup causes instability: SST develops velocity → tensor model sees large
# gradients → huge anisotropic correction → divergence on first eval step.
warmup_time = 0
verbose = true
print_interval = 200
gpu_only_mode = true
qoi_freq = 100
qoi_output_dir = qoi_duct
