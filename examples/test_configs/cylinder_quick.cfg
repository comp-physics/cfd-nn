# Quick cylinder test (no warmup, Re=100 is laminar)
Nx = 384
Ny = 288
ibm_body = cylinder
ibm_radius = 0.5
ibm_eta = 0.1
nu = 0.01
dp_dx = -0.004
max_steps = 500000
T_final = 100.0
CFL_max = 0.15
dt_safety = 0.85
adaptive_dt = true
convective_scheme = skew
time_integrator = rk3
poisson_solver = auto
poisson_tol = 1e-6
warmup_time = 0
verbose = true
print_interval = 100
gpu_only_mode = true
simulation_mode = unsteady
qoi_freq = 100
qoi_output_dir = qoi_cylinder
