# Cylinder Re=100 SIMPLE test (small grid for fast iteration)
Nx = 64
Ny = 48
x_min = -3.0
x_max = 8.0
y_min = -3.0
y_max = 3.0

ibm_body = cylinder
ibm_radius = 0.5
ibm_cx = 1.5
ibm_cy = 0.0
ibm_eta = 0.1

nu = 0.01
dp_dx = -0.004

max_steps = 500
tol = 1e-6
time_integrator = simple
simulation_mode = unsteady
simple_alpha_u = 0.7
simple_alpha_p = 0.3
simple_jacobi_sweeps = 10

CFL_max = 0.5
adaptive_dt = true
dt = 0.01
verbose = true
print_interval = 10
output_freq = 50

poisson_solver = mg
perturbation_amplitude = 0.01

# RK3 warm-up develops the flow before SIMPLE takes over
warmup_model = sst
warmup_time = 10.0
