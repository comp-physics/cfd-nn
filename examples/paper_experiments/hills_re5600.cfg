# Paper a posteriori: Periodic hills Re_H=5600 (McConkey training Re)
# Grid: 1536x768 needed for stability with explicit RK3 + IBM
# Reference: SST reattachment overpredicts by ~58% (Breuer 2009 DNS)
# Validated: SST and EARSM both stable, produce different U_b

Nx = 1536
Ny = 768
Nz = 1
x_min = 0.0
x_max = 9.0
y_min = 0.0
y_max = 3.035

ibm_body = periodic_hills
ibm_eta = 0.1

# Re_H=5600: nu chosen so U_b ~ 1 at steady state
nu = 0.0001786
dp_dx = -0.05

max_steps = 200000
T_final = 200.0
CFL_max = 0.15
CFL_xz = 0.30
dt_safety = 0.85
dt_min = 1e-6
adaptive_dt = true
simulation_mode = steady
tol = 1e-8
convective_scheme = skew
time_integrator = rk3

poisson_solver = auto
poisson_tol = 1e-6

warmup_model = sst
warmup_time = 20.0

verbose = true
print_interval = 1000
gpu_only_mode = true

qoi_freq = 200
qoi_output_dir = qoi_hills
