# Paper a posteriori: Periodic hills Re_H=5600 (McConkey training Re)
# Ref: McConkey et al. (2021) training data, Breuer et al. (2009) DNS
# SST reattachment: x/H ~ 7.63 (literature: 7-8, DNS: 4.83)

Nx = 384
Ny = 192
Nz = 1
x_min = 0.0
x_max = 9.0
y_min = 0.0
y_max = 3.035

ibm_body = periodic_hills
# Penalization for warm-up stability (ghost-cell fails from cold start
# when hill touches y=0 wall). Switched to ghost-cell after warm-up.
ibm_eta = 0.1

# Re_H=5600: nu chosen so U_b ~ 1 at this dp/dx
nu = 0.0001786
dp_dx = -0.05

max_steps = 200000
T_final = 100.0
CFL_max = 0.15
CFL_xz = 0.30
dt_safety = 0.85
dt_min = 1e-6
adaptive_dt = true
simulation_mode = steady
tol = 1e-8
convective_scheme = skew
time_integrator = rk3
stretch_y = true
stretch_beta = 2.0

poisson_solver = auto
poisson_tol = 1e-6

# Warm-up: develop flow with SST + penalization, then switch to
# target model + ghost-cell IBM
warmup_model = sst
warmup_time = 20.0

verbose = true
print_interval = 1000
gpu_only_mode = true

qoi_freq = 200
qoi_output_dir = qoi_hills
