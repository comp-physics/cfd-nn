# Paper experiment: Periodic hills Re_H=5600, Grid B (medium)
# Model specified at runtime via --model CLI flag

# Grid
Nx = 64
Ny = 32
Nz = 32

# Domain
x_min = 0.0
x_max = 9.0
y_min = 0.0
y_max = 3.035
z_min = 0.0
z_max = 4.5

# Physics
nu = 0.0001786
dp_dx = -1.0
ibm_body = periodic_hills

# Solver
scheme = skew
adaptive_dt = true
CFL_max = 0.5
stretch_y = true
stretch_beta = 2.0
simulation_mode = steady
tol = 1e-8
max_steps = 20000

# Output
verbose = false
perf_mode = true
output_freq = 500
write_fields = true
num_snapshots = 10
postprocess = true
