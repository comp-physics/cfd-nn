# Paper a posteriori: Square duct Re_b=3500 (trained geometry)
# Ref: Pinelli et al. (2010) DNS secondary flows
# Re_b = U_b * D_h / nu, D_h = 2 for unit square duct [-1,1]^2
# Stretched y/z for wall-resolved SST (y+ ~ 1 at walls)

Nx = 96
Ny = 96
Nz = 96
x_min = 0.0
x_max = 6.283185
y_min = -1.0
y_max = 1.0
z_min = -1.0
z_max = 1.0

# Re_b = U_b * D_h / nu = 1.0 * 2 / 0.000571 = 3502
# dp/dx=-0.026 gives U_b≈1.0 for wall-resolved SST (from controller convergence)
# Using FIXED dp/dx: each model gets different U_b → different Re_b.
# Compare profiles normalized by each model's U_b (standard RANS practice).
# OpenFOAM (wall functions) needed dp/dx=0.010; wall-resolved needs 2.6× more.
nu = 0.000571
dp_dx = -0.026

stretch_y = true
stretch_beta = 2.0
stretch_z = true
stretch_beta_z = 2.0

max_steps = 50000
T_final = 200.0
CFL_max = 0.15
CFL_xz = 0.30
dt_safety = 0.85
dt_min = 1e-6
adaptive_dt = true
simulation_mode = steady
tol = 1e-8
convective_scheme = skew
time_integrator = rk3

# MG Poisson needed for stretched y/z (FFT requires uniform spacing)
poisson_solver = mg
poisson_tol = 1e-6
poisson_max_iter = 200

# Warm-up with SST to develop velocity gradients before switching to target model.
# Non-transport models (NN, GEP) need developed gradients for their Pope invariant
# inputs to be nonzero. The tau_div ramp (0→1 over 200 steps) prevents divergence
# from the sudden anisotropic correction after the SST→model switch.
warmup_model = sst
warmup_time = 20.0

verbose = true
print_interval = 1000
gpu_only_mode = true

qoi_freq = 500
qoi_output_dir = qoi_duct
