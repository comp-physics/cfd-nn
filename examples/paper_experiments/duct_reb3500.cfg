# Paper a posteriori: Square duct Re_b=3500 (trained geometry)
# Ref: Pinelli et al. (2010) DNS secondary flows
# Uniform grid for FFT1D Poisson solver

Nx = 96
Ny = 96
Nz = 96
x_min = 0.0
x_max = 6.283185
y_min = -1.0
y_max = 1.0
z_min = -1.0
z_max = 1.0

nu = 0.006
dp_dx = -1.0

max_steps = 200000
T_final = 50.0
CFL_max = 0.5
dt_min = 1e-4
adaptive_dt = true
simulation_mode = steady
tol = 1e-8
convective_scheme = skew
time_integrator = rk3

poisson_solver = auto
poisson_tol = 1e-6

output_freq = 500
write_fields = false
gpu_only_mode = true
perf_mode = true

qoi_freq = 1
qoi_output_dir = qoi
