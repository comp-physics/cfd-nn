# Paper a posteriori: Cylinder Re=100 — SIMPLE steady-state solver
# Ref: Tritton (1959), Williamson (1996)
#
# SIMPLE mode: converges to steady RANS solution.
# At Re=100, RANS suppresses vortex shedding — gives steady drag only.

Nx = 384
Ny = 288
Nz = 1
x_min = -10.0
x_max = 30.0
y_min = -10.0
y_max = 10.0

# Re = U_inf * D / nu = 100
nu = 0.01
dp_dx = 0.0

# SIMPLE solver
time_integrator = simple
simulation_mode = steady
simple_alpha_u = 0.7
simple_alpha_p = 0.3
max_steps = 10000
tol = 1e-6
adaptive_dt = false
dt = 1.0

convective_scheme = skew
poisson_solver = auto
poisson_tol = 1e-6

# IBM for cylinder
ibm_body = cylinder

verbose = true
output_freq = 100
gpu_only_mode = true

qoi_freq = 500
qoi_output_dir = qoi_cylinder
