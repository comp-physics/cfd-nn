# Paper a posteriori: Periodic hills Re_H=10595 (trained geometry)
# Ref: Breuer et al. (2009), separation x/H~0.22, reattachment x/H~4.72

Nx = 384
Ny = 192
Nz = 1
x_min = 0.0
x_max = 9.0
y_min = 0.0
y_max = 3.035

ibm_body = periodic_hills

nu = 0.0000944
dp_dx = -1.0

max_steps = 500000
T_final = 50.0
CFL_max = 0.15
dt_min = 1e-4
adaptive_dt = true
simulation_mode = steady
tol = 1e-8
convective_scheme = skew
time_integrator = rk3
stretch_y = true
stretch_beta = 2.0

poisson_solver = auto
poisson_tol = 1e-6

output_freq = 500
write_fields = false
gpu_only_mode = true
perf_mode = true

qoi_freq = 1
qoi_output_dir = qoi
ibm_eta = 0.1
