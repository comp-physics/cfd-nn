# Paper a posteriori: Sphere Re=200 — SIMPLE steady-state solver
# Ref: Johnson & Patel (1999)
#
# SIMPLE mode: converges to steady axisymmetric solution.

Nx = 192
Ny = 128
Nz = 128
x_min = -5.0
x_max = 15.0
y_min = -5.0
y_max = 5.0
z_min = -5.0
z_max = 5.0

# Re = U_inf * D / nu = 200
nu = 0.005
dp_dx = 0.0

# SIMPLE solver
time_integrator = simple
simulation_mode = steady
simple_alpha_u = 0.7
simple_alpha_p = 0.3
max_steps = 5000
tol = 1e-6
adaptive_dt = false
dt = 1.0

convective_scheme = skew
poisson_solver = mg
poisson_tol = 1e-6

# IBM for sphere
ibm_body = sphere

verbose = true
output_freq = 100
gpu_only_mode = true

qoi_freq = 500
qoi_output_dir = qoi_sphere
