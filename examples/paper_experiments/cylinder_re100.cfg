# Paper a posteriori: Cylinder Re=100 (laminar vortex shedding)
# Ref: Cd~1.35, St~0.165

Nx = 384
Ny = 288
Nz = 1
x_min = -3.0
x_max = 13.0
y_min = -6.0
y_max = 6.0

nu = 0.01
dp_dx = 0.0
bulk_velocity_target = 1.0

max_steps = 500000
T_final = 200.0
CFL_max = 0.3
dt_min = 1e-4
adaptive_dt = true
simulation_mode = unsteady
convective_scheme = skew
time_integrator = rk3

poisson_solver = auto
poisson_tol = 1e-6

output_freq = 50
write_fields = false
gpu_only_mode = true
perf_mode = true

qoi_freq = 1
qoi_output_dir = qoi
ibm_eta = 0
