# Paper a posteriori: Cylinder Re=100 (laminar vortex shedding)
# Ref: Cd~1.35 (Tritton 1959), St~0.165 (Williamson 1996)
# 2D IBM with ghost-cell method
# Cd from momentum balance: Cd = |dp/dx| * V / (0.5 * U_b^2 * A_ref)
#
# Usage: ./cylinder --config this.cfg --model <turb_model>
# The warmup_model/warmup_time are used when a turb model is specified.
# For laminar (--model none), warmup is skipped automatically.

Nx = 384
Ny = 288
Nz = 1
x_min = -3.0
x_max = 13.0
y_min = -6.0
y_max = 6.0

ibm_body = cylinder
ibm_radius = 0.5

nu = 0.01
dp_dx = -0.004

max_steps = 500000
T_final = 500.0
CFL_max = 0.15
CFL_xz = 0.30
dt_safety = 0.85
dt_min = 1e-5
adaptive_dt = true
simulation_mode = unsteady
convective_scheme = skew
time_integrator = rk3

poisson_solver = auto
poisson_tol = 1e-6

# Warm-up settings (used when turb model is not none)
warmup_model = sst
warmup_time = 50.0

verbose = true
print_interval = 1000
gpu_only_mode = true

qoi_freq = 100
qoi_output_dir = qoi_cylinder
