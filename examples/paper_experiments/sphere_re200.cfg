# Paper a posteriori: Sphere Re=200 (steady non-axisymmetric)
# Ref: Cd~0.77, separation angle ~117 deg (Johnson & Patel 1999)
# 3D IBM with ghost-cell method
# Cd from momentum balance: Cd = |dp/dx| * V / (0.5 * U_b^2 * A_ref)

Nx = 192
Ny = 128
Nz = 128
x_min = -4.0
x_max = 11.0
y_min = -4.0
y_max = 4.0
z_min = -4.0
z_max = 4.0

ibm_body = sphere
ibm_radius = 0.5

nu = 0.005
dp_dx = -0.0005

max_steps = 200000
T_final = 400.0
CFL_max = 0.15
CFL_xz = 0.30
dt_safety = 0.85
dt_min = 1e-5
adaptive_dt = true
simulation_mode = unsteady
convective_scheme = skew
time_integrator = rk3

poisson_solver = auto
poisson_tol = 1e-6

# Warm-up: develop flow before switching to target model
warmup_model = sst
warmup_time = 50.0

verbose = true
print_interval = 1000
gpu_only_mode = true

qoi_freq = 200
qoi_output_dir = qoi_sphere
