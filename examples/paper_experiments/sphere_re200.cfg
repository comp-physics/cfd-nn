# Paper a posteriori: Sphere Re=200 (steady non-axisymmetric)
# Ref: Cd~0.77, separation angle ~117 deg (Johnson & Patel 1999)

Nx = 192
Ny = 128
Nz = 128
x_min = -4.0
x_max = 11.0
y_min = -4.0
y_max = 4.0
z_min = -4.0
z_max = 4.0

ibm_body = sphere
ibm_radius = 0.5

nu = 0.005
dp_dx = 0.0
bulk_velocity_target = 1.0

max_steps = 100000
T_final = 50.0
CFL_max = 0.3
dt_safety = 0.85
dt_min = 1e-4
adaptive_dt = true
simulation_mode = unsteady
convective_scheme = skew
time_integrator = rk3

poisson_solver = auto
poisson_tol = 1e-6

output_freq = 50
write_fields = false
gpu_only_mode = true
perf_mode = true

qoi_freq = 1
qoi_output_dir = qoi
ibm_eta = 0
