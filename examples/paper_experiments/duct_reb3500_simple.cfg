# Paper a posteriori: Square duct Re_b=3500 — SIMPLE steady-state solver
# Ref: Pinelli et al. (2010) DNS secondary flows
# Re_b = U_b * D_h / nu, D_h = 2 for unit square duct [-1,1]^2
#
# SIMPLE mode: no warm-up, no tau_div ramp, turbulence model active from iter 1.
# Directly comparable to OpenFOAM simpleFoam.

Nx = 96
Ny = 96
Nz = 96
x_min = 0.0
x_max = 6.283185
y_min = -1.0
y_max = 1.0
z_min = -1.0
z_max = 1.0

# Re_b ~ 3500: nu=0.000571, dp/dx chosen for U_b ~ 1
nu = 0.000571
dp_dx = -0.003

stretch_y = true
stretch_beta = 2.0
stretch_z = true
stretch_beta_z = 2.0

# SIMPLE solver — no CFL/dt constraints
time_integrator = simple
simulation_mode = steady
simple_alpha_u = 0.7
simple_alpha_p = 0.3
max_steps = 10000
tol = 1e-6
adaptive_dt = false
dt = 1.0

# MG Poisson needed for stretched y/z
poisson_solver = mg
poisson_tol = 1e-6

convective_scheme = skew

# NO warm-up — model active from iteration 1
# Set turb_model via CLI: --model sst / --model nn_tbnn etc.

verbose = true
output_freq = 100
gpu_only_mode = true

qoi_freq = 500
qoi_output_dir = qoi_duct
