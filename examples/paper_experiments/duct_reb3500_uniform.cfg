# Duct Re_b=3500 — UNIFORM grid + FFT Poisson (fast)
# No stretching → FFT works in x (periodic), MG in y,z (walls)
# Actually: x is periodic → FFT1D does FFT in x, tridiag in y,z
# For fully uniform grid: use standard MG but much faster (no stretching overhead)
# 
# Trade-off: y+ ≈ 3 (not fully wall-resolved, but acceptable for RANS comparison)

Nx = 96
Ny = 96
Nz = 96
x_min = 0.0
x_max = 6.283185
y_min = -1.0
y_max = 1.0
z_min = -1.0
z_max = 1.0

nu = 0.000571
dp_dx = -0.010
bulk_velocity_target = 1.0

# NO stretching → uniform grid → faster Poisson
# stretch_y = false (default)
# stretch_z = false (default)

max_steps = 50000
T_final = 200.0
CFL_max = 0.15
CFL_xz = 0.30
dt_safety = 0.85
dt_min = 1e-6
adaptive_dt = true
simulation_mode = steady
tol = 1e-8
convective_scheme = skew
time_integrator = rk3

# Auto-select: should pick FFT for periodic x + uniform grid
poisson_solver = auto
poisson_tol = 1e-6
poisson_max_iter = 200

warmup_model = sst
warmup_time = 20.0

verbose = true
print_interval = 1000
gpu_only_mode = true

qoi_freq = 500
qoi_output_dir = qoi_duct_uniform
