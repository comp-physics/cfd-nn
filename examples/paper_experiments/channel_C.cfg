# Paper experiment: Channel flow Re_tau=180, Grid C (coarse)
# Model specified at runtime via --model CLI flag

# Grid
Nx = 32
Ny = 32
Nz = 32

# Domain
x_min = 0.0
x_max = 6.283185
y_min = -1.0
y_max = 1.0
z_min = 0.0
z_max = 3.141593

# Physics
nu = 0.005556
dp_dx = -1.0

# Solver
scheme = skew
adaptive_dt = true
CFL_max = 0.5
stretch_y = true
stretch_beta = 2.0
simulation_mode = steady
tol = 1e-8
max_steps = 10000

# Output
verbose = false
perf_mode = true
output_freq = 500
write_fields = true
num_snapshots = 10
postprocess = true
