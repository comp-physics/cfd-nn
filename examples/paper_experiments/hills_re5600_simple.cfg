# Paper a posteriori: Periodic hills Re_H=5600 — SIMPLE steady-state solver
# Ref: Breuer et al. (2009) wall-resolved LES
#
# SIMPLE mode: no warm-up, no tau_div ramp, tensor models active from iter 1.
# In SIMPLE, tensor closures should not diverge (implicit treatment absorbs
# the anisotropic correction that was unstable with explicit RK3).

Nx = 384
Ny = 192
Nz = 1
x_min = 0.0
x_max = 9.0
y_min = 0.0
y_max = 3.035
z_min = 0.0
z_max = 1.0

# Re_H = 5600: nu = U_b * H / Re_H, with U_b ~ 1 and H = 1
nu = 0.000178571
dp_dx = -0.01

# SIMPLE solver
time_integrator = simple
simulation_mode = steady
simple_alpha_u = 0.7
simple_alpha_p = 0.3
max_steps = 10000
tol = 1e-6
adaptive_dt = false
dt = 1.0

convective_scheme = skew
poisson_solver = auto
poisson_tol = 1e-6

# IBM for hills geometry
ibm_body = hills

verbose = true
output_freq = 100
gpu_only_mode = true

qoi_freq = 500
qoi_output_dir = qoi_hills
